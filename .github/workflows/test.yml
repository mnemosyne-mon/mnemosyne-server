name: test
on: [push, pull_request]
jobs:
  rspec:
    name: rspec
    runs-on: ubuntu-24.04

    services:
      postgres:
        image: timescale/timescaledb:2.25.1-pg17
        env:
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 1s
          --health-timeout 5s
          --health-retries 30

    env:
      TZ: Etc/UTC
      DATABASE_URL: postgresql://postgres:secret@localhost:5432/mnemosyne

    steps:
      - uses: actions/checkout@master
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.5"
          bundler-cache: true
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"
      - run: bun install --frozen-lockfile
      - run: bun run build --mode production
      - run: bundle exec rake db:create db:setup
      - run: bundle exec rspec spec --force-color --format documentation

  rubocop:
    name: rubocop
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@master
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.5"
          bundler-cache: true
      - run: bundle exec rubocop --color --parallel --fail-level E
